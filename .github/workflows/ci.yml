name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (base + dev, SQLite only)
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Format check (ruff)
        run: ruff format --check src tests

      - name: Tests (pytest)
        run: pytest -q

      - name: Migration smoke test (SQLite)
        env:
          DISCORD_TOKEN: dummy-ci-token
          SEARCH_PROVIDERS: mock
          DATABASE_URL: sqlite+aiosqlite:///./ci_jobbot.db
        run: |
          alembic upgrade head
          test -f ci_jobbot.db && echo "migration created ci_jobbot.db"
