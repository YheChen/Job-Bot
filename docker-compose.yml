services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jobbot
      POSTGRES_PASSWORD: jobbot
      POSTGRES_DB: jobbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Compose networking overrides the host/port from .env.
      DATABASE_URL: postgresql+asyncpg://jobbot:jobbot@db:5432/jobbot
      HEALTH_HOST: 0.0.0.0
      HEALTH_PORT: "8080"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
